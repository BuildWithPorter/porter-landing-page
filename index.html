<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://buildwithporter.com/" />

    <title>Porter: AI bookkeeper, accountant, and finance team for startups and SMBs</title>
    <meta name="description" content="Porter is the AI-native bookkeeper, accountant, and finance team for startups and small businesses. A modern AI accounting software plus a managed service — bookkeeping, AR, AP, payroll, tax — at a fraction of the cost of hiring an in-house team." />
    <meta name="theme-color" content="#101211" />

    <!-- Open Graph (LinkedIn, Slack, Facebook, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Porter" />
    <meta property="og:title" content="Porter: AI bookkeeper, accountant, and finance team for startups and SMBs" />
    <meta property="og:description" content="The AI-native bookkeeping, accounting, and finance team for startups and SMBs. AI bookkeeper, AI accountant, AI CFO — bookkeeping, AR, AP, payroll, tax — done for you, at a fraction of the cost of hiring one." />
    <meta property="og:url" content="https://buildwithporter.com/" />
    <meta property="og:image" content="https://buildwithporter.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Porter — An entire finance team, at your fingertips." />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Porter: AI bookkeeper, accountant, and finance team for startups and SMBs" />
    <meta name="twitter:description" content="The AI-native bookkeeping, accounting, and finance team for startups and SMBs. AI bookkeeper, AI accountant, AI CFO — bookkeeping, AR, AP, payroll, tax — done for you." />
    <meta name="twitter:image" content="https://buildwithporter.com/og-image.png" />

    <!-- Organization schema. The strongest single AEO signal — AI engines
         use this to disambiguate the company and cite the right URL/logo. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Porter",
        "alternateName": ["Porter AI", "Porter AI Bookkeeper", "Porter AI Accountant"],
        "legalName": "Porter Operations LLC",
        "url": "https://buildwithporter.com",
        "logo": "https://buildwithporter.com/porter-logo-dark.svg",
        "description": "Porter is the AI-native ledger that scales with the business and speaks the operator's language, not the accountant's. We provide AI bookkeeping, AI accounting, AR, AP, payroll, and tax services — done for you, with human finance leads overseeing every action. Nothing posts to your ledger without explicit human approval.",
        "knowsAbout": [
          "AI bookkeeping",
          "AI accounting",
          "AI CFO services",
          "AI accounts payable",
          "AI accounts receivable",
          "Automated bookkeeping",
          "Small business accounting",
          "Startup finance",
          "QuickBooks alternative"
        ],
        "foundingDate": "2025",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "New York",
          "addressRegion": "NY",
          "addressCountry": "US"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "support@buildwithporter.com",
          "contactType": "customer support"
        }
      }
    </script>

    <!-- WebSite schema with SearchAction — Google uses this for sitelinks
         search box; AI engines use it as a hint of canonical site identity. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Porter",
        "url": "https://buildwithporter.com",
        "publisher": {
          "@type": "Organization",
          "name": "Porter"
        }
      }
    </script>

    <!-- SoftwareApplication schema. Tells AI search engines what Porter is,
         who it's for, and what it costs (when pricing is published). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Porter",
        "alternateName": "Porter AI Bookkeeper",
        "applicationCategory": "BusinessApplication",
        "applicationSubCategory": "AccountingSoftware",
        "operatingSystem": "Web, iOS, macOS, Windows",
        "url": "https://buildwithporter.com",
        "description": "AI-native bookkeeper, accountant, and finance team for startups and small businesses. AI bookkeeping, AI accounting, accounts receivable, accounts payable, payroll, and tax — managed end-to-end with operator-first software. Porter is an AI-native ledger that speaks the operator's language, not the accountant's.",
        "featureList": [
          "AI bookkeeping with human oversight",
          "AI accounting automation",
          "Automated AR (invoicing + collections)",
          "Automated AP (bill capture + payment)",
          "Real-time financial reporting",
          "Monthly close in 48 hours",
          "Slack, Claude (MCP), and email channels",
          "Approval-gated ledger (no auto-post)"
        ],
        "offers": {
          "@type": "Offer",
          "url": "https://buildwithporter.com",
          "availability": "https://schema.org/InStock"
        },
        "publisher": {
          "@type": "Organization",
          "name": "Porter"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=EB+Garamond:wght@400&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
