<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Obsidian brand tile (rounded, full-bleed) so the mark reads as a crisp
       app icon in the browser tab — matches the Slack/Chestnut treatment. -->
  <rect width="512" height="512" rx="112" fill="#101211"/>

  <!-- Three overlapping circles, scaled to fill the tile.
       Grayscale → white progression, the canonical Porter brand mark. -->
  <circle cx="184" cy="256" r="116" fill="#5A5A5A"/>
  <circle cx="256" cy="256" r="116" fill="#9A9A9A"/>
  <circle cx="328" cy="256" r="116" fill="#FFFFFF"/>
</svg>
